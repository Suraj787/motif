profile: marketing-expressive
description: >
  SaaS marketing sites, corporate and brand sites. Visitors evaluate and decide.
  Brand-forward motion is licensed, provided it never delays the message or CTA.

goals:
  - comprehension
  - product-identity
  - usability
  - feedback
  - performance

preferred_patterns:
  - hero-entrance
  - scroll-reveal (modest, accessible)
  - cause-effect motion (feature to benefit)
  - kinetic-typography (focal)
  - expressive-backgrounds (auroras/beams, sparingly)
  - synchronized-comparison (pricing)

restricted_effects:
  - scroll-hijacking            # forbidden; use scroll-linked reveals instead
  - fake-loading
  - motion-near-cta-that-delays-click
  - autoplay-too-fast-to-read

continuous_motion_policy: limited   # ambient brand motion allowed, must pause off-screen / reduced-motion

dependency_budget:
  policy: moderate
  add_library: lightweight-vue-friendly-or-justified-gsap
  notes: Canvas/WebGL allowed for hero set-pieces with fallbacks.

performance_budget:
  target_fps: 60
  max_hero_payload_kb: 500
  defer_offscreen_animation: true
  mobile_first_performance: true

max_high_attention_effects_per_viewport: 2

reduced_motion_policy: mandatory

mobile_constraints:
  pointer_only_effects: provide-fallback
  reduce_ambient_motion_on_mobile: true
  honor_touch_targets: true
