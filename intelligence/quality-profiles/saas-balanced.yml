profile: saas-balanced
description: >
  Consumer and B2B SaaS applications. Task-first, but a measured amount of
  polish and delight is welcome and reinforces quality.

goals:
  - usability
  - comprehension
  - feedback
  - continuity
  - product-identity
  - performance

preferred_patterns:
  - shared-element-transition
  - route-transition
  - skeleton-screens
  - optimistic-ui
  - system-feedback
  - inline-validation
  - command-palette
  - subtle-hover-affordance

restricted_effects:
  - scroll-hijacking            # forbidden
  - custom-cursor               # forbidden in work areas
  - stacked-glow
  - continuous-backgrounds-in-work-areas
  - long-success-animation
  - confetti-on-frequent-actions

continuous_motion_policy: discouraged   # allowed only on marketing surfaces, never in work areas

dependency_budget:
  policy: existing-deps-first
  add_library: lightweight-vue-friendly-only-when-justified
  notes: GSAP only for genuinely complex sequencing; no Three.js by default.

performance_budget:
  target_fps: 60
  max_animation_duration_ms: 400
  no_layout_jank: true

max_high_attention_effects_per_viewport: 2

reduced_motion_policy: mandatory

mobile_constraints:
  pointer_only_effects: provide-fallback
  honor_touch_targets: true
