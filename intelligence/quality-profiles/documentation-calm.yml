profile: documentation-calm
description: >
  Documentation, references, knowledge bases. Readers want answers with minimal
  cognitive load. Near-zero motion; nothing may hinder scanning or search.

goals:
  - usability
  - comprehension
  - performance
  - maintainability

preferred_patterns:
  - accordion-expand-collapse
  - scroll-progress
  - smooth-anchor-navigation
  - sidebar-nav-orientation

restricted_effects:
  - scroll-reveal-that-hides-content   # forbidden (must stay searchable/scannable)
  - animated-code-blocks
  - parallax
  - particles-backgrounds
  - custom-cursor
  - kinetic-typography
  - 3d-webgl

continuous_motion_policy: forbidden

dependency_budget:
  policy: native-only
  add_library: avoid
  notes: CSS and native transitions only; keep the bundle tiny.

performance_budget:
  target_fps: 60
  max_animation_duration_ms: 250
  no_layout_jank: true
  fast_first_paint: true

max_high_attention_effects_per_viewport: 1

reduced_motion_policy: mandatory

mobile_constraints:
  pointer_only_effects: forbidden
  honor_touch_targets: true
  content_never_hidden_behind_motion: true
