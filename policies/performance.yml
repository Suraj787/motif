# Performance policy. Do not claim measured performance without measurement.
budgets:
  enterprise_application:
    added_bundle_kb_max: 30
    continuous_motion: forbidden_in_work_areas
    high_attention_effects_per_viewport_max: 1
  marketing_page:
    added_bundle_kb_max: 120
    continuous_motion: allowed_if_paused_offscreen
    high_attention_effects_per_viewport_max: 2
  mobile:
    added_bundle_kb_max: 60
    prefer: static_or_css_only
  low_power_device:
    added_bundle_kb_max: 20
    continuous_motion: forbidden
review:
  - bundle_increase
  - direct_and_transitive_dependencies
  - frame_stability
  - layout_shifts
  - long_tasks
  - main_thread_work
  - gpu_usage
  - memory_growth
  - offscreen_animation
  - event_listener_cleanup
  - canvas_webgl_lifecycle
  - battery_impact
  - reduced_data_behaviour
rules:
  prefer_properties: [transform, opacity]
  pause_or_disable_offscreen_continuous_motion: true
  measurement_required_before_claims: true
